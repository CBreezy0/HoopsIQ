services:
  - type: web
    name: hoopsiq-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/dashboard.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: cron
    name: hoopsiq-daily-pipeline
    runtime: python
    schedule: "0 13 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py --backfill
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
